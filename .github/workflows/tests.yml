name: tests

on:
  pull_request:
    branches:
      - main

jobs:
  unit-integration-build:
    name: unit + integration + build
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install data processing system dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Prepare database
        run: npm run data:prepare

      - name: Run unit and integration tests
        run: rm -rf .vite && vitest run

      - name: Build application
        run: npm run build

  e2e:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: android
            browser: chromium

          - project: ios
            browser: webkit

          - project: android-tablet
            browser: chromium

          - project: ipad
            browser: webkit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install data processing system dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Prepare database
        run: npm run data:prepare

      - name: Build application
        run: npm run build

      - name: Install Playwright browser and dependencies
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests for ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }}